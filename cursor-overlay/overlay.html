<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor Overlay</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      #secondary-cursor {
        position: fixed;
        top: 0;
        left: 0;
        width: 13px;
        height: 15px;
        pointer-events: none;
        clip-path: polygon(0 0, 100% 50%, 0 100%);
        background: linear-gradient(135deg, #7dd3fc 0%, #3b82f6 60%, #1d4ed8 100%);
        filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.55));
        will-change: transform;
      }

      #secondary-cursor.clicking {
        filter: drop-shadow(0 0 14px rgba(56, 189, 248, 0.95));
      }

      #click-ring {
        position: fixed;
        top: 0;
        left: 0;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(125, 211, 252, 0.95);
        border-radius: 999px;
        opacity: 0;
        transform: translate3d(0, 0, 0) scale(0.42);
        pointer-events: none;
      }

      #click-ring.active {
        animation: click-ping 0.58s ease-out forwards;
      }

      @keyframes click-ping {
        0% {
          opacity: 0.9;
          transform: translate3d(var(--x, 0), var(--y, 0), 0) scale(0.4);
        }
        100% {
          opacity: 0;
          transform: translate3d(var(--x, 0), var(--y, 0), 0) scale(2.1);
        }
      }

    </style>
  </head>
  <body>
    <div id="secondary-cursor" aria-hidden="true"></div>
    <div id="click-ring" aria-hidden="true"></div>
    <script src="./overlay.js"></script>
  </body>
</html>
